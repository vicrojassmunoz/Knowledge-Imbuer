[rss_sources]
sources = [
    # Model & Product releases
    { url = "https://openai.com/blog/rss/", name = "OpenAI Blog" },
    { url = "https://www.anthropic.com/rss.xml", name = "Anthropic Blog" },
    { url = "https://blog.google/technology/ai/rss/", name = "Google AI Blog" },
    { url = "https://mistral.ai/feed.xml", name = "Mistral Blog" },
    { url = "https://huggingface.co/blog/feed.xml", name = "HuggingFace Blog" },

    # Applied AI & Engineering
    { url = "https://simonwillison.net/atom/everything/", name = "Simon Willison" },
    { url = "https://www.latent.space/feed", name = "Latent Space" },
    { url = "https://www.interconnects.ai/feed", name = "Interconnects" },

    # High-impact tech news
    { url = "https://techcrunch.com/category/artificial-intelligence/feed/", name = "TechCrunch AI" },
    { url = "https://feeds.arstechnica.com/arstechnica/technology-lab", name = "Ars Technica" },
    { url = "https://venturebeat.com/category/ai/feed/", name = "VentureBeat AI" },

    # Dev tools
    { url = "https://papers.takara.ai/api/feed", name = "HF Daily Papers" },
]

[reddit]
base_url="https://www.reddit.com"
min_upvotes = 5
max_results = 10
subreddits = [
    { name = "MachineLearning", sort = "top" },
    { name = "LocalLLaMA", sort = "hot" },
    { name = "artificial", sort = "hot" },
]

[hn]
query = "AI ML machine learning LLM"
min_points = 50
url = "https://hn.algolia.com/api/v1/search"

[history]
max_entries = 500
path = "data/history.json"

[filter]
max_input_items = 30
max_workers = 2
min_score = 7
temperature = 0.1
max_tokens = 1024

system_prompt = """
You are curating a digest for an AI Solutions Engineer — someone who builds and ships AI products professionally, not an academic researcher.

Your reader wants:
- New model releases with real capability improvements (not just benchmarks)
- Open source tools, frameworks, SDKs they can use in production
- AI engineering patterns: RAG, agents, evals, prompt engineering, deployment
- Industry moves that affect the AI landscape (acquisitions, major launches, API changes)
- Practical tutorials only if they cover non-obvious techniques

Ruthlessly reject:
- Academic papers with no practical application
- Incremental research with no real-world impact
- Hype without substance
- Anything that reads like it belongs on Arxiv and nowhere else
- Political drama, funding rounds, hiring posts

Score 9-10: Ships today, changes how I work
Score 7-8: Interesting, worth reading this week
Score 1-6: Academic noise, drop it

Respond with JSON only:
{"keep": true/false, "score": 1-10, "one_liner": "what this means for someone building AI products, in 15 words or less"}
"""

[prefilter]
vip_keywords = ["qwen", "llama", "gemini", "mistral", "deepseek", "phi", "gpt", "claude"]
keywords = [
    # Models & releases
    "llm", "language model", "model release", "open source", "weights",
    "gpt", "claude", "gemini", "llama", "mistral", "qwen", "deepseek",

    # Engineering & tools
    "rag", "agent", "mcp", "api", "sdk", "framework", "library",
    "inference", "deployment", "fine-tuning", "quantization", "embedding",
    "langchain", "llamaindex", "ollama", "vllm", "huggingface",

    # Infrastructure & hardware
    "nvidia", "gpu", "chip", "cuda", "tpu", "npu", "hardware accelerator",
    "inference speed", "latency", "throughput",

    # Applied AI
    "multimodal", "vision", "audio", "code generation", "copilot",
    "automation", "workflow", "production", "enterprise",

    # Industry signals
    "launch", "release", "announcement", "acquisition", "partnership",
    "github", "benchmark", "leaderboard",
]

blacklist = [
    "hiring", "job opening", "hackathon", "meetup", "event",
    "partnership", "funding", "series a", "acquisition", "ipo",
    "we are excited to announce", "proud to share", "arxiv", "preprint",
    "we propose", "we present a novel", "outperforms state-of-the-art",
    "ablation study"
]
max_age_hours = 24

[models]
qwen = "qwen/qwen3-32b"
llama = "llama-3.3-70b-versatile"
scout = "meta-llama/llama-4-scout-17b-16e-instruct"
llama8b = "llama-3.1-8b-instant"
active = "qwen"
fallback_order = ["qwen", "llama", "scout", "llama8b"]

[logging]
level = "INFO"
