<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Imbuer — Stats</title>
    <link rel="icon" href="data:,">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
        }

        header { margin-bottom: 2.5rem; }

        .header-top {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.4rem;
        }

        .fire { font-size: 1.6rem; }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        h1 span { color: #f78166; }

        .subtitle {
            color: #8b949e;
            font-size: 0.875rem;
            font-style: italic;
            margin-left: 2.4rem;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 10px;
            padding: 1.2rem 1.4rem;
        }

        .card .label {
            font-size: 0.72rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 500;
        }

        .card .value {
            font-size: 2.2rem;
            font-weight: 700;
            margin-top: 0.25rem;
            letter-spacing: -0.02em;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #8b949e;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .table-wrapper {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 10px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }

        th {
            text-align: left;
            padding: 0.75rem 1rem;
            background: #161b22;
            border-bottom: 1px solid #21262d;
            color: #8b949e;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #161b22;
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }

        tr.clickable { cursor: pointer; }
        tr.clickable:hover td { background: #1c2128; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.55rem;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .badge-ok { background: #1a3a2a; color: #3fb950; border: 1px solid #2d6a40; }
        .badge-empty { background: #3d1f1f; color: #f85149; border: 1px solid #6e2c2c; }

        .delivered-ok { font-weight: 700; color: #3fb950; }
        .delivered-zero { color: #f85149; }

        .sources-cell {
            color: #8b949e;
            font-size: 0.78rem;
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .funnel {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.82rem;
            color: #8b949e;
        }

        .funnel .num { color: #e6edf3; font-weight: 500; }
        .funnel .arrow { color: #484f58; font-size: 0.7rem; }

        /* — Detail view — */

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: none;
            border: 1px solid #21262d;
            color: #8b949e;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            margin-bottom: 1.5rem;
        }

        .back-btn:hover { border-color: #388bfd; color: #58a6ff; }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .panel {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 10px;
            padding: 1.2rem;
        }

        .panel-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #8b949e;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .reason-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.6rem;
        }

        .reason-label {
            font-size: 0.8rem;
            color: #8b949e;
            width: 130px;
            flex-shrink: 0;
        }

        .reason-bar-wrap {
            flex: 1;
            background: #21262d;
            border-radius: 4px;
            height: 6px;
            overflow: hidden;
        }

        .reason-bar { height: 100%; border-radius: 4px; }

        .reason-count {
            font-size: 0.8rem;
            color: #e6edf3;
            font-weight: 500;
            width: 36px;
            text-align: right;
        }

        .item-row {
            padding: 0.75rem 0;
            border-bottom: 1px solid #21262d;
        }

        .item-row:last-child { border-bottom: none; }

        .item-title {
            font-size: 0.875rem;
            font-weight: 500;
            color: #58a6ff;
            text-decoration: none;
            display: block;
            margin-bottom: 0.2rem;
        }

        .item-title:hover { text-decoration: underline; }

        .item-meta {
            font-size: 0.75rem;
            color: #8b949e;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .item-score {
            background: #1a3a2a;
            color: #3fb950;
            border: 1px solid #2d6a40;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .item-one-liner {
            font-size: 0.78rem;
            color: #8b949e;
            margin-top: 0.2rem;
            font-style: italic;
        }

        /* — Loading / error — */

        .loading {
            text-align: center;
            padding: 5rem 2rem;
            color: #8b949e;
        }

        .loading .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid #21262d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            text-align: center;
            padding: 4rem 2rem;
            color: #f85149;
        }

        footer {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #21262d;
            color: #484f58;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        footer a { color: #58a6ff; text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 700px) {
            .detail-grid { grid-template-columns: 1fr; }
            .hide-mobile { display: none; }
            .sources-cell { max-width: 140px; }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const SUPABASE_URL = "https://teqdjytnblxqhfgyjfrq.supabase.co"
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlcWRqeXRuYmx4cWhmZ3lqZnJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMTE0MDcsImV4cCI6MjA5MjU4NzQwN30.NXXYaDEoBmV2attamFop2ATJrKH63p5MWPvIkm6Rm5k"

const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

function formatDate(iso) {
    return new Date(iso).toLocaleString("en-GB", {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        timeZone: "UTC"
    }) + " UTC"
}

const REASON_COLORS = {
    too_old:        "#484f58",
    keyword_miss:   "#388bfd",
    blacklist:      "#d2a8ff",
    exact_dedup:    "#ffa657",
    semantic_dedup: "#e3b341",
    llm_score:      "#f78166",
    llm_error:      "#f85149",
}

const REASON_LABELS = {
    too_old:        "Too old",
    keyword_miss:   "Keyword miss",
    blacklist:      "Blacklist",
    exact_dedup:    "Exact dedup",
    semantic_dedup: "Semantic dedup",
    llm_score:      "LLM score",
    llm_error:      "LLM error",
}

function StatCard({ label, value, color = "#58a6ff" }) {
    return (
        <div className="card">
            <div className="label">{label}</div>
            <div className="value" style={{ color }}>{value}</div>
        </div>
    )
}

function RunRow({ run, onClick }) {
    const delivered = run.delivered ?? 0
    const sources = run.sources ?? {}
    const topSources = Object.entries(sources)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3)
        .map(([s, c]) => `${s} (${c})`)
        .join(" · ")

    return (
        <tr className="clickable" onClick={() => onClick(run)}>
            <td>
                <div style={{ display: "flex", alignItems: "center", gap: "0.6rem" }}>
                    <span className={`badge ${delivered > 0 ? "badge-ok" : "badge-empty"}`}>
                        {delivered > 0 ? "ok" : "empty"}
                    </span>
                    <span style={{ fontSize: "0.82rem", color: "#8b949e" }}>
                        {formatDate(run.timestamp)}
                    </span>
                </div>
            </td>
            <td className="hide-mobile">
                <div className="funnel">
                    <span className="num">{run.fetched ?? 0}</span>
                    <span className="arrow">›</span>
                    <span className="num">{run.after_prefilter ?? 0}</span>
                    <span className="arrow">›</span>
                    <span className="num">{run.after_dedup ?? 0}</span>
                </div>
            </td>
            <td>
                <span className={delivered > 0 ? "delivered-ok" : "delivered-zero"}>
                    {delivered}
                </span>
            </td>
            <td style={{ color: "#8b949e", fontSize: "0.82rem" }}>
                {run.duration_seconds?.toFixed(1)}s
            </td>
            <td className="sources-cell hide-mobile">{topSources || "—"}</td>
        </tr>
    )
}

function DiscardsPanel({ runId }) {
    const [discards, setDiscards] = React.useState([])
    const [loading, setLoading] = React.useState(true)

    React.useEffect(() => {
        async function load() {
            const { data } = await db
                .from("discarded_items")
                .select("reason")
                .eq("run_id", runId)
            if (data) setDiscards(data)
            setLoading(false)
        }
        load()
    }, [runId])

    if (loading) return (
        <div className="panel">
            <div className="panel-title">Discard reasons</div>
            <p style={{ color: "#8b949e", fontSize: "0.82rem" }}>Loading...</p>
        </div>
    )

    const counts = discards.reduce((acc, d) => {
        acc[d.reason] = (acc[d.reason] ?? 0) + 1
        return acc
    }, {})

    const total = discards.length
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1])

    return (
        <div className="panel">
            <div className="panel-title">Discard reasons — {total} total</div>
            {sorted.length === 0 && (
                <p style={{ color: "#8b949e", fontSize: "0.82rem" }}>No discards recorded.</p>
            )}
            {sorted.map(([reason, count]) => (
                <div className="reason-row" key={reason}>
                    <div className="reason-label">{REASON_LABELS[reason] ?? reason}</div>
                    <div className="reason-bar-wrap">
                        <div
                            className="reason-bar"
                            style={{
                                width: `${Math.round((count / total) * 100)}%`,
                                background: REASON_COLORS[reason] ?? "#8b949e"
                            }}
                        />
                    </div>
                    <div className="reason-count">{count}</div>
                </div>
            ))}
        </div>
    )
}

function DeliveredPanel({ runId }) {
    const [items, setItems] = React.useState([])
    const [loading, setLoading] = React.useState(true)

    React.useEffect(() => {
        async function load() {
            const { data } = await db
                .from("items")
                .select("title, url, source, score, one_liner")
                .eq("run_id", runId)
                .order("score", { ascending: false })
            if (data) setItems(data)
            setLoading(false)
        }
        load()
    }, [runId])

    if (loading) return (
        <div className="panel">
            <div className="panel-title">Delivered items</div>
            <p style={{ color: "#8b949e", fontSize: "0.82rem" }}>Loading...</p>
        </div>
    )

    return (
        <div className="panel">
            <div className="panel-title">Delivered items — {items.length}</div>
            {items.length === 0 && (
                <p style={{ color: "#8b949e", fontSize: "0.82rem" }}>No items delivered this run.</p>
            )}
            {items.map((item, i) => (
                <div className="item-row" key={i}>
                    <a
                        href={item.url}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="item-title"
                    >
                        {item.title}
                    </a>
                    <div className="item-meta">
                        <span className="item-score">{item.score}/10</span>
                        <span>{item.source}</span>
                    </div>
                    {item.one_liner && (
                        <div className="item-one-liner">{item.one_liner}</div>
                    )}
                </div>
            ))}
        </div>
    )
}

function RunDetail({ run, onBack }) {
    return (
        <div>
            <button className="back-btn" onClick={onBack}>← Back</button>

            <div style={{ marginBottom: "1.5rem" }}>
                <div style={{ fontSize: "1.1rem", fontWeight: 600, marginBottom: "0.4rem" }}>
                    Run — {formatDate(run.timestamp)}
                </div>
                <div className="funnel">
                    <span>Fetched</span>
                    <span className="num" style={{ marginLeft: "0.3rem" }}>{run.fetched ?? 0}</span>
                    <span className="arrow">›</span>
                    <span>Prefilter</span>
                    <span className="num" style={{ marginLeft: "0.3rem" }}>{run.after_prefilter ?? 0}</span>
                    <span className="arrow">›</span>
                    <span>Dedup</span>
                    <span className="num" style={{ marginLeft: "0.3rem" }}>{run.after_dedup ?? 0}</span>
                    <span className="arrow">›</span>
                    <span>Delivered</span>
                    <span className="num" style={{ marginLeft: "0.3rem", color: "#3fb950" }}>{run.delivered ?? 0}</span>
                </div>
            </div>

            <div className="detail-grid">
                <DiscardsPanel runId={run.id} />
                <DeliveredPanel runId={run.id} />
            </div>
        </div>
    )
}

function App() {
    const [runs, setRuns] = React.useState([])
    const [loading, setLoading] = React.useState(true)
    const [error, setError] = React.useState(null)
    const [selectedRun, setSelectedRun] = React.useState(null)

    async function load() {
        setLoading(true)
        setError(null)
        const { data, error } = await db
            .from("runs")
            .select("*")
            .order("timestamp", { ascending: false })
            .limit(14)

        if (error) {
            setError(error.message)
        } else {
            setRuns(data)
        }
        setLoading(false)
    }

    React.useEffect(() => { load() }, [])

    const totalDelivered = runs.reduce((s, r) => s + (r.delivered ?? 0), 0)
    const successfulRuns = runs.filter(r => (r.delivered ?? 0) > 0).length
    const avgDelivered = runs.length ? (totalDelivered / runs.length).toFixed(1) : "0"
    const lastRun = runs[0] ? formatDate(runs[0].timestamp) : "—"

    return (
        <div className="container">
            <header>
                <div className="header-top">
                    <span className="fire">🔥</span>
                    <h1>Knowledge <span>Imbuer</span></h1>
                    <button
                        onClick={() => { setSelectedRun(null); load() }}
                        disabled={loading}
                        style={{
                            marginLeft: "auto",
                            background: "transparent",
                            border: "1px solid #30363d",
                            color: "#8b949e",
                            borderRadius: "6px",
                            padding: "0.3rem 0.75rem",
                            fontSize: "0.8rem",
                            cursor: loading ? "not-allowed" : "pointer"
                        }}
                    >
                        {loading ? "Loading…" : "Refresh"}
                    </button>
                </div>
                <p className="subtitle">
                    Prometheus stole fire from the gods. This bot steals signal from the noise.
                </p>
            </header>

            {loading && (
                <div className="loading">
                    <div className="spinner" />
                    <p>Loading stats...</p>
                </div>
            )}

            {error && (
                <div className="error">Failed to load stats: {error}</div>
            )}

            {!loading && !error && (
                selectedRun ? (
                    <RunDetail run={selectedRun} onBack={() => setSelectedRun(null)} />
                ) : (
                    <>
                        <div className="cards">
                            <StatCard label="Runs tracked" value={runs.length} />
                            <StatCard label="Successful" value={successfulRuns} color="#3fb950" />
                            <StatCard label="Total delivered" value={totalDelivered} color="#d2a8ff" />
                            <StatCard label="Avg per run" value={avgDelivered} color="#ffa657" />
                        </div>

                        <p className="section-title">Last 14 runs</p>
                        <div className="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Run</th>
                                        <th className="hide-mobile">Pipeline</th>
                                        <th>Delivered</th>
                                        <th>Duration</th>
                                        <th className="hide-mobile">Top sources</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {runs.map(r => (
                                        <RunRow key={r.id} run={r} onClick={setSelectedRun} />
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </>
                )
            )}

            <div style={{
                marginTop: "2.5rem",
                paddingTop: "1.5rem",
                borderTop: "1px solid #21262d",
                color: "#484f58",
                fontSize: "0.8rem",
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center"
            }}>
                <span>Last run: {lastRun}</span>
                <a
                    href="https://github.com/vicrojassmunoz/Knowledge-Imbuer"
                    target="_blank"
                    rel="noopener noreferrer"
                    style={{ color: "#58a6ff", textDecoration: "none" }}
                >
                    GitHub
                </a>
            </div>
        </div>
    )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />)
</script>
</body>
</html>
