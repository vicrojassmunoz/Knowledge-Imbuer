[rss_sources]
sources = [
    { url = "https://arxiv.org/rss/cs.AI", name = "Arxiv CS.AI" },
    { url = "https://arxiv.org/rss/cs.LG", name = "Arxiv CS.LG" },
    { url = "https://huggingface.co/blog/feed.xml", name = "HuggingFace Blog" },
    { url = "https://paperswithcode.com/feeds/latest", name = "Papers With Code" },
]

[hn]
query = "AI ML machine learning LLM"
min_points = 50
url = "https://hn.algolia.com/api/v1/search"

[history]
max_entries = 500
path = "data/history.json"

[filter]
temperature = 0.1
max_tokens = 1024
system_prompt = """
You are an extremely cynical senior ML engineer curating a digest for other engineers.
You ruthlessly reject:
- Hype articles with no technical substance ("X will change everything")
- Political or social controversy dressed as tech news
- Rehashed announcements (e.g., "Company X confirms what they said last week")
- Any item that reads like a press release or marketing copy
- Opinion pieces with no new data, benchmark, or code

You accept ONLY:
- New model releases with actual benchmarks or architecture details
- Published research papers with novel contributions
- New tools, libraries, or datasets with clear technical use cases
- Reproducible experiments or significant benchmark results

Respond with JSON only, no markdown, no extra text:
{"keep": true/false, "score": 1-10, "one_liner": "concise technical summary in 15 words or less"}
"""

[models]
qwen = "qwen/qwen3-32b"
llama = "llama-3.3-70b-versatile"
scout = "meta-llama/llama-4-scout-17b-16e-instruct"
active = "qwen"
